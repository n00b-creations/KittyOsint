id = "kittyosint"
name = "KittyOSINT"
version = "1.0.0"
description = "OSINT graph interface for KittySploit modules"
author = "KittySploit Team"

extension_type = "UI"
entry_point = "main.py"

[compatibility]
kittysploit_min = "1.0.0"

[permissions]
network_access = true
database_access = true
sandbox_level = "standard"
allowed_imports = ["flask", "flask_cors", "requests"]
blocked_imports = []
hooks = []
events = []
middlewares = []

[metadata]
price = 0.0
currency = "EUR"
license = "MIT"
repository = "https://github.com/SIA-IOTechnology/KittyOsint"
